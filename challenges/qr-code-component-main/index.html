<!DOCTYPE html>

<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QR 코드 컴포넌트 실습</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<main class="container">

  <article class="qr-card">

    <div class="qr-card__image-container">
      <img src="assets/images/image-qr-code.png" alt="프론트엔드 멘토 사이트로 연결되는 QR 코드">
    </div>

    <div class="qr-card__content">
      <h1 class="qr-card__title">
        Improve your front-end skills by building projects
      </h1>

      <p class="qr-card__description">
        Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
    </div>

  </article> </main> </body>
</html>
